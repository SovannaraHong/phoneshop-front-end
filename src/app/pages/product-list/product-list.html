<main class="px-[20px] py-[20px] bg-[#f5f4f2]">
  <!-- PRODUCT AREA -->
  <div class="flex items-center justify-between mb-4">
    <h1 class="brand-font text-2xl font-bold text-gray-900">Mobiles</h1>
    <span class="text-sm text-gray-400">52 products</span>
  </div>
  <!-- @if (brandList$ | async; as brandList) {
    <div class="flex flex-wrap gap-2 mb-5">
      @for (brand of brandList; track $index) {
        <button
          class="rounded-[10px] text-[15px] transition-colors cursor-pointer px-[10px] py-[4px]"
          [ngClass]="{
            'bg-blue-500 text-white': selectedBrand?.id === brand.id,
            'bg-white text-gray-700': selectedBrand?.id !== brand.id,
          }"
          onclick="setActive(brand)"
        >
          {{ brand.name }}
        </button>
      }
    </div>
  } -->
  <div *ngIf="brandList$ | async as brandList" class="flex flex-wrap gap-2 mb-5">
    <button (click)="showAll()" class="px-3 py-1 rounded">All</button>
    <button
      *ngFor="let brand of brandList"
      (click)="setActive(brand)"
      [ngClass]="{
        'bg-blue-500 text-white': selectedBrand?.id === brand.id,
        'bg-white text-gray-700': selectedBrand?.id !== brand.id,
      }"
      class="rounded-[10px] text-[15px] transition-colors cursor-pointer px-[10px] py-[4px]"
    >
      {{ brand.name }}
    </button>
  </div>

  <!-- Sort + view -->
  <div class="flex items-center justify-between border-b border-gray-200 mb-6">
    <div class="flex gap-7">
      <button class="sort-tab active" onclick="setSort(this)">Popularity</button>
      <button class="sort-tab" onclick="setSort(this)">by Price</button>
      <button class="sort-tab" onclick="setSort(this)">by Ratings</button>
    </div>
    <div class="flex items-center gap-3 pb-2">
      <button
        class="flex items-center gap-1.5 text-xs text-gray-500 border border-gray-200 rounded-lg px-3 py-1.5 hover:border-indigo-400 transition-colors"
      >
        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-.293.707L13 13.414V19a1 1 0 01-.553.894l-4 2A1 1 0 017 21v-7.586L3.293 6.707A1 1 0 013 6V4z"
          />
        </svg>
        Filters
      </button>
      <button class="text-gray-400 hover:text-indigo-600 transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 10h16M4 14h16M4 18h16"
          />
        </svg>
      </button>
      <button class="text-indigo-600">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
          <path
            d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zM5 11a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zM11 5a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V5zM11 13a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"
          />
        </svg>
      </button>
    </div>
  </div>
  <main
    *ngIf="filteredProducts$ | async as productList"
    class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5"
  >
    <div
      *ngFor="let pro of productList"
      class="w-[310px] bg-white rounded-[20px] shadow-[0_2px_24px_rgba(0,0,0,0.07)] overflow-hidden"
    >
      <!-- Image -->
      <div class="relative h-[230px] bg-[#f0eeeb] overflow-hidden">
        <img
          [src]="pro.imagePath"
          onerror="this.src = 'https://placehold.co/160x160/dce8ff/5b3ee6?text=📱'"
          alt="Product"
          class="w-full h-full object-cover"
        />

        <!-- Discount Badge -->
        <span
          class="absolute top-3 left-3 bg-white text-[#111] text-[11px] font-medium px-3 py-1 rounded-full tracking-wide"
        >
          20% OFF
        </span>
        <!-- Rating Badge -->
        <span
          class="absolute top-3 right-3 bg-white text-[#111] text-[11px] font-medium px-3 py-1 rounded-full"
        >
          ★ 4.8
        </span>
      </div>

      <!-- Body -->
      <div class="p-5">
        <!-- Category -->
        <p class="text-[10.5px] text-[#aaa] uppercase tracking-[1px] mb-1">Accessories</p>

        <!-- Name -->
        <p class="text-[16px] font-medium text-[#111] leading-snug mb-2">
          {{ pro.name }}
        </p>

        <!-- Description -->
        <p class="text-[13px] text-[#888] leading-relaxed mb-4">
          {{ pro.description }}
        </p>

        <!-- Specs -->
        <div class="bg-[#fafafa] rounded-xl px-3.5 py-3 mb-4">
          <div class="flex justify-between items-center py-[5px] border-b border-[#f0f0f0]">
            <span class="text-[12.5px] text-[#aaa]">{{ pro.unit }}</span>
            <span class="text-[12.5px] text-[#333] font-medium">Unit</span>
          </div>

          <div class="flex justify-between items-center py-[5px] border-b border-[#f0f0f0]">
            <span class="text-[12.5px] text-[#aaa]">Rating</span>
            <span class="text-[12.5px] text-[#333] font-medium">4.8 / 5.0</span>
          </div>

          <div class="flex justify-between items-center py-[5px] border-b border-[#f0f0f0]">
            <span class="text-[12.5px] text-[#aaa]">Discount</span>
            <span class="text-[12.5px] text-[#e05c3a] font-medium">20%</span>
          </div>

          <div class="flex justify-between items-center py-[5px]">
            <span class="text-[12.5px] text-[#aaa]">Original price</span>
            <span class="text-[12.5px] text-[#bbb] line-through">${{ pro.salePrice }}</span>
          </div>
        </div>

        <!-- Price + Stock -->
        <div class="flex justify-between items-center mb-4">
          <div>
            <p class="text-[11px] text-[#aaa] mb-0.5">Final price</p>
            <p class="text-[26px] font-medium text-[#111] tracking-tight leading-none">
              ${{ pro.salePrice }}<span class="text-[15px]">.00</span>
            </p>
          </div>
          <span
            [ngClass]="pro.active ? 'bg-[#edf7f1] text-[#2e8a57]' : 'bg-[#ef80ae] text-[#ffffff]'"
            class="text-[11.5px] font-medium px-3 py-1.5 rounded-full"
          >
            {{ pro.active ? 'In Stock' : 'Out of Stock' }}
          </span>
        </div>

        <!-- Button -->
        <button
          onclick="
            this.textContent = 'Added to cart ✓';
            this.classList.remove('bg-white', 'text-[#111]');
            this.classList.add('bg-[#111]', 'text-white');
          "
          class="w-full py-3 rounded-xl border-[1.5px] border-[#111] bg-white text-[#111] text-[13.5px] font-medium tracking-wide cursor-pointer transition-all duration-200 hover:bg-[#111] hover:text-white"
        >
          Add to Cart
        </button>
      </div>
    </div>
  </main>
</main>
