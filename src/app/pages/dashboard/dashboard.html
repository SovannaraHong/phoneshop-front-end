<body class="bg-[#edf0f4] min-h-screen">
  <!-- TOP INFO BAR -->
  <div
    class="bg-white border-b border-gray-100 px-6 py-2 flex justify-between items-center text-xs text-gray-400"
  >
    <button
      class="flex items-center gap-1 font-medium text-gray-600 hover:text-indigo-600 transition-colors"
    >
      <svg class="w-3.5 h-3.5 text-indigo-500" fill="currentColor" viewBox="0 0 20 20">
        <path
          fill-rule="evenodd"
          d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z"
          clip-rule="evenodd"
        />
      </svg>
      Cambodia
      <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2.5"
          d="M19 9l-7 7-7-7"
        />
      </svg>
    </button>
    <div class="flex items-center gap-7">
      <span class="hover:text-indigo-600 cursor-pointer transition-colors"
        >Shopping and payments</span
      >
      <span class="hover:text-indigo-600 cursor-pointer transition-colors">The shops</span>
      <span class="hover:text-indigo-600 cursor-pointer transition-colors">Support</span>
      <span class="hover:text-indigo-600 cursor-pointer transition-colors"
        >Payment and Transfers</span
      >
      <span class="hover:text-indigo-600 cursor-pointer transition-colors">Guarantors</span>
      <span class="font-semibold text-gray-700">(+91) 9898-989-898</span>
    </div>
  </div>

  <!-- LAYOUT -->
  <div class="flex" style="height: calc(100vh - 32px)">
    <!-- SIDEBAR -->
    <aside
      class="w-56 bg-white border-r border-gray-100 flex flex-col py-5 shrink-0 overflow-y-auto"
    >
      <!-- Logo -->
      <div class="flex items-center gap-2.5 px-5 mb-7">
        <div
          class="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center shadow-lg"
          style="box-shadow: 0 8px 20px rgba(91, 62, 230, 0.35)"
        >
          <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 20 20">
            <path
              d="M3 1a1 1 0 000 2h1.22l.305 1.222a.997.997 0 00.01.042l1.358 5.43-.893.892C3.74 11.846 4.632 14 6.414 14H15a1 1 0 000-2H6.414l1-1H14a1 1 0 00.894-.553l3-6A1 1 0 0017 3H6.28l-.31-1.243A1 1 0 005 1H3z"
            />
            <path
              d="M16 16.5a1.5 1.5 0 11-3 0 1.5 1.5 0 013 0zM6.5 18a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"
            />
          </svg>
        </div>
        <div>
          <div class="brand-font text-[15px] font-bold text-gray-900 leading-none tracking-tight">
            PHONESHOP SYSTEM
          </div>
          <div class="text-[10px] text-gray-400 mt-0.5">Shopping made simple</div>
        </div>
      </div>

      <!-- Nav Links -->
      <nav class="flex flex-col gap-0.5 px-3">
        <a class="nav-link" [routerLink]="['/dashboard', 'home']" routerLinkActive="active">
          <svg
            class="w-[18px] h-[18px] shrink-0"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.8"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
            />
          </svg>
          Home
        </a>
        <a class="nav-link" [routerLink]="['/dashboard', 'product']" routerLinkActive="active">
          <svg
            class="w-[18px] h-[18px] shrink-0"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.8"
              d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
            />
          </svg>
          Grocery
        </a>
        <a class="nav-link" routerLink="/dashboard/productList" routerLinkActive="active">
          <svg
            class="w-[18px] h-[18px] shrink-0"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.8"
              d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"
            />
          </svg>
          Mobiles
        </a>
        <a class="nav-link" [routerLink]="['/dashboard', 'user']" routerLinkActive="active">
          <svg
            class="w-[18px] h-[18px] shrink-0"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.8"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
            />
          </svg>
          Fashion
        </a>
        <a class="nav-link" [routerLink]="['/dashboard', 'bakong']">
          <svg
            class="w-[18px] h-[18px] shrink-0"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.8"
              d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2h-2"
            />
          </svg>
          Electronics
        </a>
        <a class="nav-link">
          <svg
            class="w-[18px] h-[18px] shrink-0"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.8"
              d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"
            />
          </svg>
          Top Offers
        </a>
        <a class="nav-link">
          <svg
            class="w-[18px] h-[18px] shrink-0"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.8"
              d="M13 10V3L4 14h7v7l9-11h-7z"
            />
          </svg>
          Appliances
        </a>
        <a class="nav-link">
          <svg
            class="w-[18px] h-[18px] shrink-0"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.8"
              d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064"
            />
          </svg>
          Travel
        </a>
        <a class="nav-link">
          <svg
            class="w-[18px] h-[18px] shrink-0"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.8"
              d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
            />
          </svg>
          Beauty, Toys &amp; More
        </a>
        <a class="nav-link">
          <svg
            class="w-[18px] h-[18px] shrink-0"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.8"
              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
          Sale
        </a>
      </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <!-- HEADER -->
      <header class="bg-white border-b border-gray-100 px-7 py-4 flex items-center gap-5 shrink-0">
        <button
          class="flex items-center gap-1.5 border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-700 font-medium hover:border-indigo-400 transition-colors whitespace-nowrap"
        >
          Categories
          <svg class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2.5"
              d="M19 9l-7 7-7-7"
            />
          </svg>
        </button>

        <div
          class="search-wrap flex-1 flex rounded-xl overflow-hidden border border-gray-200 transition-all duration-200"
        >
          <input
            type="text"
            placeholder="Search keywords"
            class="flex-1 px-4 py-2.5 text-sm outline-none bg-white text-gray-700 placeholder-gray-400"
          />
          <button
            class="flex items-center gap-2 px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold transition-colors"
          >
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2.5"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
              />
            </svg>
            Search
          </button>
        </div>

        <div class="flex items-center gap-5 ml-1">
          <button class="text-gray-400 hover:text-indigo-600 transition-colors" routerLink="/login">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.8"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
              />
            </svg>
          </button>
          <button class="relative text-gray-400 hover:text-red-400 transition-colors">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.8"
                d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
              />
            </svg>
            <span
              class="absolute -top-1.5 -right-1.5 bg-indigo-600 text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center"
              >2</span
            >
          </button>
          <button class="text-gray-400 hover:text-indigo-600 transition-colors">
            <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.8"
                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"
              />
            </svg>
          </button>
          <button
            class="relative text-gray-400 hover:text-indigo-600 transition-colors flex items-center gap-2"
          >
            <div class="relative">
              <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="1.8"
                  d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
                />
              </svg>
              <span
                class="absolute -top-1.5 -right-1.5 bg-indigo-600 text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center"
                >3</span
              >
            </div>
            <div class="text-left">
              <div class="text-[9px] text-gray-400 leading-none">Value</div>
              <div class="text-sm font-bold text-gray-800 leading-tight">$1500</div>
            </div>
          </button>
        </div>
      </header>
      <main class="flex-1 overflow-y-auto">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>

  <script>
    function setActive(el) {
      document.querySelectorAll('.brand-pill').forEach((b) => b.classList.remove('active'));
      el.classList.add('active');
    }
    function setSort(el) {
      document.querySelectorAll('.sort-tab').forEach((t) => t.classList.remove('active'));
      el.classList.add('active');
    }
  </script>
</body>
