<div class="relative bg-white">
  <!-- Subtle top color bar -->
  <div
    class="h-1 w-full bg-gradient-to-r from-indigo-500 via-violet-500 to-fuchsia-500 rounded-t-xl"
  ></div>

  <!-- ── HEADER ─────────────────────────────────────────────────── -->
  <div class="px-8 pt-7 pb-0">
    <div class="flex items-start justify-between">
      <div>
        <div
          class="inline-flex items-center gap-2 border border-indigo-100 bg-indigo-50 text-indigo-600 text-[10px] font-black px-3.5 py-1.5 rounded-full mb-4 tracking-[1.2px] uppercase"
        >
          <i class="fa-regular fa-user text-[10px]"></i>
          New User
        </div>
        <h1 class="text-[1.45rem] font-black text-slate-900 tracking-tight leading-tight">
          Create User Account
        </h1>
        <p class="text-[12px] text-slate-400 mt-1.5 font-medium">
          Fill in the details below to register a new user.
        </p>
      </div>

      <!-- Live avatar -->
      <div class="relative flex-shrink-0">
        <div
          class="w-[58px] h-[58px] rounded-2xl bg-gradient-to-br from-indigo-500 via-violet-500 to-fuchsia-500 flex items-center justify-center text-white font-black text-xl shadow-xl shadow-indigo-200/80 ring-4 ring-indigo-50"
        >
          avatarInitials
        </div>
        <div
          class="absolute -bottom-1 -right-1 w-4 h-4 rounded-full bg-emerald-400 border-2 border-white shadow-md"
        ></div>
      </div>
    </div>

    <div class="h-px bg-slate-100 mt-6"></div>
  </div>

  <!-- ── TOAST ──────────────────────────────────────────────────── -->
  @if (isSuccess()) {
    <div
      class="fixed top-5 right-5 z-50 flex items-center gap-3 bg-white border border-slate-100 shadow-2xl shadow-slate-200/80 rounded-2xl px-5 py-4"
    >
      <div
        class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center flex-shrink-0 shadow-lg shadow-emerald-200"
      >
        <svg
          class="w-5 h-5 text-white"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          viewBox="0 0 24 24"
        >
          <polyline points="20 6 9 17 4 12" />
        </svg>
      </div>
      <div>
        <p class="text-[13px] font-bold text-slate-800">User Created!</p>
        <p class="text-[11px] text-slate-400 mt-0.5">New account has been registered.</p>
      </div>
      <button
        (click)="isSuccess.set(false)"
        class="ml-3 w-7 h-7 rounded-lg bg-slate-50 hover:bg-slate-100 flex items-center justify-center text-slate-400 hover:text-slate-600 transition-all border border-slate-100 cursor-pointer"
      >
        <svg
          class="w-3 h-3"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          viewBox="0 0 24 24"
        >
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>
  }

  <!-- ── FORM ───────────────────────────────────────────────────── -->
  <form class="px-8 py-7" [formGroup]="userForm" (ngSubmit)="onSubmit()">
    <div class="grid grid-cols-2 gap-x-5 gap-y-5">
      <!-- ━━ Profile Image (full width) ━━━━━━━━━━━━━━━━━━━━━━━━ -->
      <div class="col-span-2 flex flex-col gap-2">
        <label class="text-[10.5px] font-black text-slate-400 uppercase tracking-[1px]">
          Profile Image
        </label>
        <div class="flex items-center gap-4">
          <!-- Preview -->
          <div class="relative flex-shrink-0">
            <div
              class="w-[72px] h-[72px] rounded-2xl bg-gradient-to-br from-slate-100 to-slate-50 border-2 border-dashed border-slate-200 flex items-center justify-center overflow-hidden cursor-pointer hover:border-indigo-300 hover:bg-indigo-50/50 transition-all duration-200 group"
            >
              @if (previewUrl()) {
                <img [src]="previewUrl()" class="w-full h-full object-cover" alt="preview" />
              } @else {
                <div
                  class="flex flex-col items-center gap-1 text-slate-300 group-hover:text-indigo-400 transition-colors"
                >
                  <i class="fa-solid fa-camera text-lg"></i>
                  <span class="text-[8.5px] font-black uppercase tracking-wider">Photo</span>
                </div>
              }
            </div>
            <div
              class="absolute -bottom-1.5 -right-1.5 w-6 h-6 rounded-full bg-gradient-to-br from-indigo-500 to-violet-500 flex items-center justify-center shadow-lg shadow-indigo-200 cursor-pointer hover:scale-110 transition-transform"
            >
              <i class="fa-solid fa-plus text-white text-[9px]"></i>
            </div>
          </div>

          <!-- Drop zone -->
          <label
            class="flex-1 flex flex-col items-center justify-center h-[72px] rounded-2xl border-2 border-dashed border-slate-200 bg-slate-50/60 hover:bg-indigo-50/60 hover:border-indigo-300 transition-all duration-200 cursor-pointer group"
          >
            <input type="file" accept="image/*" class="hidden" (change)="onSelectFile($event)" />
            <div class="flex items-center gap-3">
              <div
                class="w-8 h-8 rounded-xl bg-white border border-slate-100 flex items-center justify-center shadow-sm group-hover:border-indigo-200 group-hover:shadow-indigo-100 transition-all"
              >
                <i
                  class="fa-solid fa-cloud-arrow-up text-slate-300 group-hover:text-indigo-400 text-sm transition-colors"
                ></i>
              </div>
              <div>
                <p
                  class="text-[12.5px] font-bold text-slate-500 group-hover:text-slate-700 transition-colors"
                >
                  Drop image or <span class="text-indigo-500">browse files</span>
                </p>
                <p class="text-[10.5px] text-slate-400 mt-0.5">PNG, JPG, WEBP — max 5 MB</p>
              </div>
            </div>
          </label>
        </div>
      </div>

      <!-- ━━ Section: Personal Info ━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
      <div class="col-span-2 flex items-center gap-3 pt-1 -mb-0.5">
        <span class="text-[9.5px] font-black text-indigo-400 uppercase tracking-[1.6px]"
          >Personal Info</span
        >
        <div class="flex-1 h-px bg-gradient-to-r from-indigo-100 to-transparent"></div>
      </div>

      <!-- First Name -->
      <div class="flex flex-col gap-1.5">
        <label
          class="text-[10.5px] font-black text-slate-400 uppercase tracking-[0.9px] flex items-center gap-1"
        >
          First Name <span class="text-rose-400">*</span>
        </label>
        <div
          class="flex items-center h-[46px] bg-slate-50 border border-slate-200 rounded-xl overflow-hidden transition-all duration-200 focus-within:border-indigo-400 focus-within:bg-white focus-within:shadow-lg focus-within:shadow-indigo-100/70 hover:border-slate-300"
        >
          <span
            class="w-11 h-full flex items-center justify-center text-slate-300 text-[13px] border-r border-slate-200 flex-shrink-0 transition-colors focus-within:text-indigo-400"
          >
            <i class="fa-solid fa-user text-gray-400"></i>
          </span>
          <input
            formControlName="firstName"
            type="text"
            placeholder="Your FirstName"
            class="flex-1 bg-transparent border-none outline-none text-[13.5px] font-medium text-slate-700 px-3.5 h-full placeholder-slate-300"
          />
        </div>
      </div>

      <!-- Last Name -->
      <div class="flex flex-col gap-1.5">
        <label
          class="text-[10.5px] font-black text-slate-400 uppercase tracking-[0.9px] flex items-center gap-1"
        >
          Last Name <span class="text-rose-400">*</span>
        </label>
        <div
          class="flex items-center h-[46px] bg-slate-50 border border-slate-200 rounded-xl overflow-hidden transition-all duration-200 focus-within:border-violet-400 focus-within:bg-white focus-within:shadow-lg focus-within:shadow-violet-100/70 hover:border-slate-300"
        >
          <span
            class="w-11 h-full flex items-center justify-center text-slate-300 text-[13px] border-r border-slate-200 flex-shrink-0"
          >
            <i class="fa-solid fa-user text-gray-400"></i>
          </span>
          <input
            formControlName="lastName"
            type="text"
            placeholder="Your LastName"
            class="flex-1 bg-transparent border-none outline-none text-[13.5px] font-medium text-slate-700 px-3.5 h-full placeholder-slate-300"
          />
        </div>
      </div>

      <!-- Username -->
      <div class="flex flex-col gap-1.5">
        <label
          class="text-[10.5px] font-black text-slate-400 uppercase tracking-[0.9px] flex items-center gap-1"
        >
          Username <span class="text-rose-400">*</span>
        </label>
        <div
          class="flex items-center h-[46px] bg-slate-50 border border-slate-200 rounded-xl overflow-hidden transition-all duration-200 focus-within:border-cyan-400 focus-within:bg-white focus-within:shadow-lg focus-within:shadow-cyan-100/70 hover:border-slate-300"
        >
          <span
            class="w-11 h-full flex items-center justify-center text-slate-300 text-[13px] border-r border-slate-200 flex-shrink-0"
          >
            <i class="fa-solid fa-at text-gray-400"></i>
          </span>
          <input
            formControlName="username"
            type="text"
            placeholder="Your Username"
            class="flex-1 bg-transparent border-none outline-none text-[13.5px] font-medium text-slate-700 px-3.5 h-full placeholder-slate-300"
          />
        </div>
      </div>

      <!-- Phone -->
      <div class="flex flex-col gap-1.5">
        <label class="text-[10.5px] font-black text-slate-400 uppercase tracking-[0.9px]"
          >Phone Number</label
        >
        <div
          class="flex items-center h-[46px] bg-slate-50 border border-slate-200 rounded-xl overflow-hidden transition-all duration-200 focus-within:border-sky-400 focus-within:bg-white focus-within:shadow-lg focus-within:shadow-sky-100/70 hover:border-slate-300"
        >
          <span
            class="w-11 h-full flex items-center justify-center text-slate-300 text-[13px] border-r border-slate-200 flex-shrink-0"
          >
            <i class="fa-solid fa-phone text-gray-400"></i>
          </span>
          <input
            formControlName="phone"
            type="tel"
            placeholder="012345678"
            class="flex-1 bg-transparent border-none outline-none text-[13.5px] font-medium text-slate-700 px-3.5 h-full placeholder-slate-300"
          />
        </div>
      </div>

      <!-- Place of Birth -->
      <div class="flex flex-col gap-1.5">
        <label class="text-[10.5px] font-black text-slate-400 uppercase tracking-[0.9px]"
          >Place of Birth</label
        >
        <div
          class="flex items-center h-[46px] bg-slate-50 border border-slate-200 rounded-xl overflow-hidden transition-all duration-200 focus-within:border-teal-400 focus-within:bg-white focus-within:shadow-lg focus-within:shadow-teal-100/70 hover:border-slate-300"
        >
          <span
            class="w-11 h-full flex items-center justify-center text-slate-300 text-[13px] border-r border-slate-200 flex-shrink-0"
          >
            <i class="fa-solid fa-location-dot text-gray-400"></i>
          </span>
          <input
            formControlName="pob"
            type="text"
            placeholder="Phnom Penh"
            class="flex-1 bg-transparent border-none outline-none text-[13.5px] font-medium text-slate-700 px-3.5 h-full placeholder-slate-300"
          />
        </div>
      </div>

      <!-- Status -->
      <div class="flex flex-col gap-1.5">
        <label
          class="text-[10.5px] font-black text-slate-400 uppercase tracking-[0.9px] flex items-center gap-1"
        >
          Status <span class="text-rose-400">*</span>
        </label>
        <div class="flex gap-3 h-[46px]">
          <label
            class="flex-1 flex items-center gap-2.5 px-4 rounded-xl border text-[13px] font-bold cursor-pointer transition-all duration-200 select-none"
            [ngClass]="
              getStatus?.value === 'Active'
                ? 'border-emerald-300 bg-emerald-50 text-emerald-600 shadow-md shadow-emerald-100'
                : 'border-slate-200 bg-slate-50 text-slate-400'
            "
          >
            <input type="radio" formControlName="status" value="Active" class="hidden" />
            <span
              class="w-2.5 h-2.5 rounded-full bg-emerald-400 flex-shrink-0 shadow-sm shadow-emerald-300"
            ></span>
            Active
          </label>
          <label
            class="flex-1 flex items-center gap-2.5 px-4 rounded-xl border text-[13px] font-bold cursor-pointer transition-all duration-200 select-none"
            [ngClass]="
              getStatus?.value === 'Inactive'
                ? 'border-slate-400 bg-slate-100 text-slate-600 shadow-md shadow-slate-200'
                : 'border-slate-200 bg-slate-50 text-slate-400'
            "
          >
            <input type="radio" formControlName="status" value="Inactive" class="hidden" />
            <span class="w-2.5 h-2.5 rounded-full bg-slate-300 flex-shrink-0"></span>
            Inactive
          </label>
        </div>
      </div>

      <!-- ━━ Section: Security ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
      <div class="col-span-2 flex items-center gap-3 pt-1 -mb-0.5">
        <span class="text-[9.5px] font-black text-pink-400 uppercase tracking-[1.6px]"
          >Security</span
        >
        <div class="flex-1 h-px bg-gradient-to-r from-pink-100 to-transparent"></div>
      </div>

      <!-- Password -->
      <div class="flex flex-col gap-1.5">
        <label
          class="text-[10.5px] font-black text-slate-400 uppercase tracking-[0.9px] flex items-center gap-1"
        >
          Password <span class="text-rose-400">*</span>
        </label>
        <div
          class="flex items-center h-[46px] bg-slate-50 border border-slate-200 rounded-xl overflow-hidden transition-all duration-200 focus-within:border-pink-400 focus-within:bg-white focus-within:shadow-lg focus-within:shadow-pink-100/70 hover:border-slate-300"
        >
          <span
            class="w-11 h-full flex items-center justify-center text-slate-300 text-[13px] border-r border-slate-200 flex-shrink-0"
          >
            <i class="fa-solid fa-lock text-gray-400"></i>
          </span>
          <input
            formControlName="password"
            placeholder="Min. 8 characters"
            class="flex-1 bg-transparent border-none outline-none text-[13.5px] font-medium text-slate-700 px-3.5 h-full placeholder-slate-300"
          />
          <button
            type="button"
            class="w-11 h-full flex items-center justify-center text-slate-300 hover:text-slate-500 transition-colors bg-transparent border-none cursor-pointer flex-shrink-0"
          >
            <i class="fa-solid fa-eye text-sm"></i>
          </button>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="flex flex-col gap-1.5">
        <label
          class="text-[10.5px] font-black text-slate-400 uppercase tracking-[0.9px] flex items-center gap-1"
        >
          Confirm Password <span class="text-rose-400">*</span>
        </label>
        <div
          class="flex items-center h-[46px] bg-slate-50 border border-slate-200 rounded-xl overflow-hidden transition-all duration-200 focus-within:border-pink-400 focus-within:bg-white focus-within:shadow-lg focus-within:shadow-pink-100/70 hover:border-slate-300"
        >
          <span
            class="w-11 h-full flex items-center justify-center text-slate-300 text-[13px] border-r border-slate-200 flex-shrink-0"
          >
            <i class="fa-solid fa-lock text-gray-400"></i>
          </span>
          <input
            formControlName="confirmPassword"
            placeholder="Min. 8 characters"
            class="flex-1 bg-transparent border-none outline-none text-[13.5px] font-medium text-slate-700 px-3.5 h-full placeholder-slate-300"
          />
          <button
            type="button"
            class="w-11 h-full flex items-center justify-center text-slate-300 hover:text-slate-500 transition-colors bg-transparent border-none cursor-pointer flex-shrink-0"
          >
            <i class="fa-solid fa-eye text-sm"></i>
          </button>
        </div>
      </div>

      <!-- ━━ Section: Permissions ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
      <div class="col-span-2 flex items-center gap-3 pt-1 -mb-0.5">
        <span class="text-[9.5px] font-black text-violet-400 uppercase tracking-[1.6px]"
          >Permissions</span
        >
        <div class="flex-1 h-px bg-gradient-to-r from-violet-100 to-transparent"></div>
      </div>

      <!-- Roles -->
      <div class="col-span-2 flex flex-col gap-1.5">
        <label
          class="text-[10.5px] font-black text-slate-400 uppercase tracking-[0.9px] flex items-center gap-1"
        >
          Assign Roles <span class="text-rose-400">*</span>
        </label>
        <div
          formArrayName="roles"
          class="flex flex-wrap gap-2 p-3.5 bg-slate-50 border border-slate-200 rounded-xl min-h-[56px] items-center transition-all duration-200 focus-within:border-violet-300 focus-within:bg-white focus-within:shadow-lg focus-within:shadow-violet-100/50"
        >
          @for (role of roleList(); track $index) {
            <label
              class="flex items-center gap-2 px-3.5 py-2 rounded-lg border border-slate-200 bg-white text-[12px] font-bold text-slate-500 cursor-pointer hover:border-indigo-300 hover:bg-indigo-50 hover:text-indigo-600 transition-all duration-150 shadow-sm"
            >
              <input
                type="checkbox"
                [formControlName]="$index"
                class="w-3.5 h-3.5 accent-indigo-500 cursor-pointer"
              />
              {{ role.name }}
            </label>
          }
        </div>
      </div>
    </div>

    <!-- ── FOOTER ─────────────────────────────────────────────── -->
    <div class="flex items-center gap-2.5 mt-7 pt-5 border-t border-slate-100">
      <button
        type="button"
        class="inline-flex items-center gap-2 px-4 h-10 rounded-xl text-[12.5px] font-bold border border-slate-200 bg-white text-slate-500 hover:border-indigo-300 hover:text-indigo-600 hover:bg-indigo-50 hover:shadow-md hover:shadow-indigo-100 transition-all duration-200 shadow-sm"
      >
        <svg
          class="w-3.5 h-3.5"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
        >
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
          <line x1="16" y1="13" x2="8" y2="13" />
          <line x1="16" y1="17" x2="8" y2="17" />
        </svg>
        Preview JSON
      </button>

      <button
        type="button"
        class="px-4 h-10 rounded-xl text-[12.5px] font-bold bg-transparent border-none text-slate-400 hover:text-slate-700 hover:bg-slate-100 transition-all duration-150 cursor-pointer"
      >
        Reset
      </button>

      <button
        type="button"
        class="px-4 h-10 rounded-xl text-[12.5px] font-bold bg-transparent border-none text-slate-400 hover:text-slate-700 hover:bg-slate-100 transition-all duration-150 cursor-pointer"
      >
        Cancel
      </button>

      <button
        type="submit"
        [disabled]="isLoading()"
        class="ml-auto inline-flex items-center gap-2.5 px-7 h-10 rounded-xl text-[13px] font-extrabold bg-gradient-to-r from-indigo-500 via-violet-500 to-fuchsia-500 text-white border-none cursor-pointer shadow-lg shadow-indigo-200 hover:shadow-xl hover:shadow-indigo-300/60 hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed disabled:translate-y-0 disabled:shadow-none"
      >
        @if (isLoading()) {
          <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
            <circle
              class="opacity-25"
              cx="12"
              cy="12"
              r="10"
              stroke="currentColor"
              stroke-width="4"
            />
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z" />
          </svg>
          Creating...
        } @else {
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            viewBox="0 0 24 24"
          >
            <polyline points="20 6 9 17 4 12" />
          </svg>
          Create User
        }
      </button>
    </div>
  </form>
</div>
