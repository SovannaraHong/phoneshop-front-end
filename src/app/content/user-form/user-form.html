<!-- Header -->
{{ userForm.value | json }}
<div class="px-8 pt-8 pb-0">
  <div class="flex items-start justify-between">
    <div>
      <div
        class="inline-flex items-center gap-2 bg-blue-50 text-blue-600 text-[0.7rem] font-bold px-3 py-1 rounded-full mb-3 tracking-widest uppercase"
      >
        <i class="fa-regular fa-user"></i>
        New User
      </div>
      <h1 class="font-serif italic text-2xl text-slate-900 leading-tight">Create User Account</h1>
      <p class="text-xs text-slate-400 mt-1.5">Fill in the details below to register a new user.</p>
    </div>

    <!-- Live avatar -->
    <div
      class="w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-600 to-violet-600 flex items-center justify-center text-white font-extrabold text-lg flex-shrink-0 shadow-[0_4px_12px_rgba(37,99,235,0.3)] transition-all"
    >
      avatarInitials
    </div>
  </div>
  <div class="h-px bg-slate-100 mt-6"></div>
</div>
<!-- ✅ Toast OUTSIDE form — fixed top right -->
@if (isSuccess()) {
  <div
    class="fixed top-6 right-6 z-50 flex items-center gap-3 bg-white border border-green-200 shadow-[0_8px_30px_rgba(0,0,0,0.12)] rounded-2xl px-5 py-4 animate-slide-in"
  >
    <div class="w-9 h-9 rounded-full bg-green-100 flex items-center justify-center flex-shrink-0">
      <svg
        class="w-5 h-5 text-green-600"
        fill="none"
        stroke="currentColor"
        stroke-width="2.5"
        viewBox="0 0 24 24"
      >
        <polyline points="20 6 9 17 4 12" />
      </svg>
    </div>
    <div>
      <p class="text-sm font-bold text-slate-800">User Created!</p>
      <p class="text-xs text-slate-400 mt-0.5">New account has been registered.</p>
    </div>
    <!-- ✅ X close button -->
    <button
      (click)="isSuccess.set(false)"
      class="ml-4 text-slate-300 hover:text-slate-500 transition-colors border-none bg-transparent cursor-pointer"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
  </div>
}

<!-- Form -->
<form class="px-8 py-6" [formGroup]="userForm" (ngSubmit)="onSubmit()">
  <div class="grid grid-cols-2 gap-x-5 gap-y-5">
    <!-- First Name -->
    <div class="flex flex-col gap-1.5">
      <label
        class="text-[0.7rem] font-bold text-slate-500 uppercase tracking-[0.8px] flex items-center gap-1"
      >
        First Name <span class="text-red-500">*</span>
      </label>
      <div
        class="flex items-center bg-slate-50 rounded-[10px] overflow-hidden transition-all border-[1.5px]"
      >
        <span
          class="px-3 h-[42px] flex items-center border-r border-slate-200 bg-white text-base flex-shrink-0"
          ><i class="fa-solid fa-user"></i
        ></span>
        <input
          formControlName="firstName"
          type="text"
          placeholder="Your FirstName"
          class="flex-1 bg-transparent border-none outline-none text-sm text-slate-900 px-3 h-[42px] placeholder-slate-400"
        />
      </div>
    </div>

    <!-- Last Name -->
    <div class="flex flex-col gap-1.5">
      <label
        class="text-[0.7rem] font-bold text-slate-500 uppercase tracking-[0.8px] flex items-center gap-1"
      >
        Last Name <span class="text-red-500">*</span>
      </label>
      <div
        class="flex items-center bg-slate-50 rounded-[10px] overflow-hidden transition-all border-[1.5px]"
      >
        <span
          class="px-3 h-[42px] flex items-center border-r border-slate-200 bg-white text-base flex-shrink-0"
          ><i class="fa-solid fa-user"></i
        ></span>
        <input
          formControlName="lastName"
          type="text"
          placeholder="Your LastName"
          class="flex-1 bg-transparent border-none outline-none text-sm text-slate-900 px-3 h-[42px] placeholder-slate-400"
        />
      </div>
    </div>

    <!-- Username -->
    <div class="flex flex-col gap-1.5">
      <label
        class="text-[0.7rem] font-bold text-slate-500 uppercase tracking-[0.8px] flex items-center gap-1"
      >
        Username <span class="text-red-500">*</span>
      </label>
      <div
        class="flex items-center bg-slate-50 rounded-[10px] overflow-hidden transition-all border-[1.5px]"
      >
        <span
          class="px-3 h-[42px] flex items-center border-r border-slate-200 bg-white text-sm font-bold text-slate-400 flex-shrink-0"
          ><i class="fa-solid fa-at"></i
        ></span>
        <input
          formControlName="username"
          type="text"
          placeholder="Your Username"
          class="flex-1 bg-transparent border-none outline-none text-sm text-slate-900 px-3 h-[42px] placeholder-slate-400"
        />
      </div>
    </div>

    <!-- Phone -->
    <div class="flex flex-col gap-1.5">
      <label class="text-[0.7rem] font-bold text-slate-500 uppercase tracking-[0.8px]"
        >Phone Number</label
      >
      <div
        class="flex items-center bg-slate-50 border-[1.5px] border-slate-200 rounded-[10px] overflow-hidden transition-all focus-within:border-blue-500 focus-within:shadow-[0_0_0_3px_rgba(37,99,235,0.1)] focus-within:bg-white"
      >
        <span
          class="px-3 h-[42px] flex items-center border-r border-slate-200 bg-white text-base flex-shrink-0"
          ><i class="fa-solid fa-phone"></i
        ></span>
        <input
          formControlName="phone"
          type="tel"
          placeholder="012345678"
          class="flex-1 bg-transparent border-none outline-none text-sm text-slate-900 px-3 h-[42px] placeholder-slate-400"
        />
      </div>
    </div>

    <!-- Password -->
    <div class="flex flex-col gap-1.5">
      <label
        class="text-[0.7rem] font-bold text-slate-500 uppercase tracking-[0.8px] flex items-center gap-1"
      >
        Password <span class="text-red-500">*</span>
      </label>
      <div
        class="flex items-center bg-slate-50 rounded-[10px] overflow-hidden transition-all border-[1.5px]"
      >
        <span
          class="px-3 h-[42px] flex items-center border-r border-slate-200 bg-white text-base flex-shrink-0"
          ><i class="fa-solid fa-lock"></i
        ></span>
        <input
          formControlName="password"
          placeholder="Min. 8 characters"
          class="flex-1 bg-transparent border-none outline-none text-sm text-slate-900 px-3 h-[42px] placeholder-slate-400"
        />
        <button
          type="button"
          class="px-3 h-[42px] flex items-center text-slate-400 hover:text-slate-600 transition-colors"
        ></button>
      </div>
    </div>
    <div class="flex flex-col gap-1.5">
      <label
        class="text-[0.7rem] font-bold text-slate-500 uppercase tracking-[0.8px] flex items-center gap-1"
      >
        Confirm Password <span class="text-red-500">*</span>
      </label>
      <div
        class="flex items-center bg-slate-50 rounded-[10px] overflow-hidden transition-all border-[1.5px]"
      >
        <span
          class="px-3 h-[42px] flex items-center border-r border-slate-200 bg-white text-base flex-shrink-0"
          ><i class="fa-solid fa-lock"></i
        ></span>
        <input
          formControlName="confirmPassword"
          placeholder="Min. 8 characters"
          class="flex-1 bg-transparent border-none outline-none text-sm text-slate-900 px-3 h-[42px] placeholder-slate-400"
        />
        <button
          type="button"
          class="px-3 h-[42px] flex items-center text-slate-400 hover:text-slate-600 transition-colors"
        ></button>
      </div>
    </div>

    <!-- Place of Birth -->
    <div class="flex flex-col gap-1.5">
      <label class="text-[0.7rem] font-bold text-slate-500 uppercase tracking-[0.8px]"
        >Place of Birth</label
      >
      <div
        class="flex items-center bg-slate-50 border-[1.5px] border-slate-200 rounded-[10px] overflow-hidden transition-all focus-within:border-blue-500 focus-within:shadow-[0_0_0_3px_rgba(37,99,235,0.1)] focus-within:bg-white"
      >
        <span
          class="px-3 h-[42px] flex items-center border-r border-slate-200 bg-white text-base flex-shrink-0"
          ><i class="fa-solid fa-location-dot"></i
        ></span>
        <input
          formControlName="pob"
          type="text"
          placeholder="Phnom Penh"
          class="flex-1 bg-transparent border-none outline-none text-sm text-slate-900 px-3 h-[42px] placeholder-slate-400"
        />
      </div>
    </div>

    <!-- Status -->
    <div class="flex flex-col gap-1.5">
      <label
        class="text-[0.7rem] font-bold text-slate-500 uppercase tracking-[0.8px] flex items-center gap-1"
      >
        Status <span class="text-red-500">*</span>
      </label>
      <div class="flex gap-3">
        <label
          class="flex-1 flex items-center gap-2.5 px-4 py-3 rounded-[10px] border-[1.5px] text-sm font-semibold cursor-pointer transition-all"
          [class.border-blue-500]="userForm.get('status')?.value === 'Active'"
          [class.text-blue-600]="userForm.get('status')?.value === 'Active'"
        >
          <input type="radio" formControlName="status" value="Active" class="hidden" />
          <span class="w-2 h-2 rounded-full bg-green-500 flex-shrink-0"></span>
          Active
        </label>
        <label
          class="flex-1 flex items-center gap-2.5 px-4 py-3 rounded-[10px] border-[1.5px] text-sm font-semibold cursor-pointer transition-all"
          [class.border-blue-500]="userForm.get('status')?.value === 'Inactive'"
          [class.text-blue-600]="userForm.get('status')?.value === 'Inactive'"
        >
          <input type="radio" formControlName="status" value="Inactive" class="hidden" />
          <span class="w-2 h-2 rounded-full bg-slate-400 flex-shrink-0"></span>
          Inactive
        </label>
      </div>
    </div>

    <!-- Roles -->
    <div class="col-span-2 flex flex-col gap-1.5">
      <label
        class="text-[0.7rem] font-bold text-slate-500 uppercase tracking-[0.8px] flex items-center gap-1"
      >
        Assign Roles <span class="text-red-500">*</span>
      </label>
      <div
        formArrayName="roles"
        class="flex flex-wrap gap-2 p-3 bg-slate-50 rounded-[10px] min-h-[52px] items-center transition-all border-[1.5px]"
      >
        @for (role of roleList(); track $index) {
          <label
            class="flex items-center gap-1.5 cursor-pointer text-sm font-medium text-slate-600"
          >
            <input type="checkbox" [formControlName]="$index" />
            {{ role.name }}
          </label>
        }
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="flex items-center gap-2.5 mt-6 pt-4 border-t border-slate-100">
    <button
      type="button"
      class="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl text-[0.8rem] font-semibold border-[1.5px] border-slate-200 bg-white text-slate-500 hover:border-blue-500 hover:text-blue-600 hover:bg-blue-50 transition-all"
    >
      <svg
        class="w-3.5 h-3.5"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        viewBox="0 0 24 24"
      >
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
        <polyline points="14 2 14 8 20 8" />
        <line x1="16" y1="13" x2="8" y2="13" />
        <line x1="16" y1="17" x2="8" y2="17" />
      </svg>
      Preview JSON
    </button>

    <button
      type="button"
      class="px-4 py-2.5 rounded-xl text-[0.8rem] font-semibold bg-transparent border-none text-slate-400 hover:text-slate-800 transition-all"
    >
      Reset
    </button>

    <button
      type="button"
      class="px-4 py-2.5 rounded-xl text-[0.8rem] font-semibold bg-transparent border-none text-slate-400 hover:text-slate-800 transition-all"
    >
      Cancel
    </button>

    <button
      type="submit"
      [disabled]="isLoading()"
      class="ml-auto inline-flex items-center gap-2 px-6 py-2.5 rounded-xl text-sm font-bold bg-blue-600 text-white border-none cursor-pointer shadow-[0_2px_10px_rgba(37,99,235,0.35)] hover:bg-blue-700 hover:-translate-y-px active:translate-y-0 transition-all disabled:opacity-60 disabled:cursor-not-allowed"
    >
      @if (isLoading()) {
        <svg class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24">
          <circle
            class="opacity-25"
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="4"
          />
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z" />
        </svg>
        Creating...
      } @else {
        <svg
          class="w-3.5 h-3.5"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          viewBox="0 0 24 24"
        >
          <polyline points="20 6 9 17 4 12" />
        </svg>
        Create User
      }
    </button>
  </div>
</form>
