<div class="w-full h-full bg-slate-100 p-6 overflow-y-auto">
  <!-- Header -->
  <div class="mb-6">
    <p class="text-xs font-semibold tracking-widest text-indigo-500 uppercase mb-1">
      Product Management
    </p>
    <h1 class="text-xl font-bold text-gray-800">Create New Product</h1>
  </div>

  <!-- Form -->
  <form #productForm="ngForm" class="space-y-5">
    <!-- Product Name -->
    <div>
      <label class="block text-xs font-semibold text-gray-500 uppercase mb-1"> Product Name </label>
      <input
        type="text"
        name="name"
        required
        placeholder="Samsung Galaxy S25 Ultra Gold"
        class="w-full bg-white border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-700 focus:ring-2 focus:ring-indigo-500 focus:outline-none"
      />
    </div>

    <!-- Brand + Model -->
    <div class="grid grid-cols-2 gap-4">
      <!-- Brand -->
      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1"> Brand </label>
        <select
          name="brandId"
          required
          class="w-full bg-white border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-700 focus:ring-2 focus:ring-indigo-500"
        >
          <option value="" disabled>Select brand</option>
          <option *ngFor="let b of brandList()" value="">{{ b.name }}</option>
        </select>
      </div>

      <!-- Model -->
      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1"> Model </label>
        <select
          name="modelName"
          required
          class="w-full bg-white border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-700 focus:ring-2 focus:ring-indigo-500"
        >
          <option value="" disabled>Select model</option>
          <option *ngFor="let m of modelList()">{{ m.name }}</option>
        </select>
      </div>
    </div>

    <!-- Color -->
    <div>
      <label class="block text-xs font-semibold text-gray-500 uppercase mb-2"> Color </label>
      <div class="flex flex-wrap gap-3">
        <!-- <button
          *ngFor="let color of colors"
          type="button"
          class="w-9 h-9 rounded-full border-2 transition"
          [ngClass]="
            product.colorName === color.name
              ? 'border-indigo-500 scale-110'
              : 'border-gray-200 hover:scale-105'
          "
        >
          <span class="block w-full h-full rounded-full" [style.background]="color.hex"></span>
        </button> -->
        <button
          *ngFor="let color of colors"
          type="button"
          class="w-9 h-9 rounded-full border-1 transition"
          (click)="onSelectColor(color)"
        >
          <span class="block w-full h-full rounded-full" [style.background]="color.hex"></span>
        </button>
      </div>

      <p class="mt-2 text-xs text-gray-500">'No color selected'</p>
    </div>

    <!-- Price + Unit -->
    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1"> Price ($) </label>
        <input
          type="number"
          name="salePrice"
          class="w-full border bg-white border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500"
        />
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1"> Units </label>
        <input
          type="number"
          name="unit"
          class="w-full border bg-white border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500"
        />
      </div>
    </div>

    <!-- Type -->
    <div>
      <label class="block text-xs font-semibold text-gray-500 uppercase mb-1"> Type Sell </label>
      <select
        name="typeSell"
        class="w-full border bg-white border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500"
      >
        <option value="" disabled>Select type</option>
        <option>type</option>
      </select>
    </div>

    <!-- Image -->
    <div>
      <label class="block text-xs font-semibold text-gray-500 uppercase mb-2"> Upload Image </label>

      <div class="flex gap-6 items-start">
        <!-- LEFT: Preview -->
        <div
          class="w-40 h-40 rounded-xl border border-gray-200 flex items-center justify-center overflow-hidden bg-gray-50"
        >
          <img
            src="https://www.apple.com/v/iphone/home/cj/images/overview/select/iphone_17__fb1277oq3eaa_large_2x.jpg"
            class="w-full h-full object-cover"
          />

          <!-- <span class="text-xs text-gray-400"> No Image </span> -->
        </div>

        <!-- RIGHT: Upload Box -->
        <div
          class="flex-1 border-2 border-dashed border-gray-300 rounded-xl p-5 text-center cursor-pointer hover:border-indigo-500 transition"
          (click)="fileInput.click()"
        >
          <input #fileInput type="file" accept="image/*" hidden />

          <p class="text-sm text-gray-600 font-medium">Click to upload image</p>
          <p class="text-xs text-gray-400 mt-1">PNG, JPG up to 5MB</p>

          <!-- File name -->
          <p class="text-xs text-indigo-500 mt-3 truncate">product.imagePath</p>
        </div>
      </div>
    </div>

    <!-- Description -->
    <div>
      <label class="block text-xs font-semibold text-gray-500 uppercase mb-1"> Description </label>
      <textarea
        name="description"
        rows="3"
        class="w-full bg-white border border-gray-200 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-indigo-500"
      ></textarea>
    </div>

    <!-- Active -->
    <div
      class="flex items-center justify-between border border-gray-200 bg-white rounded-xl px-4 py-3"
    >
      <span class="text-sm font-medium text-gray-700">Active</span>
      <button type="button" class="w-11 h-6 flex items-center rounded-full transition">
        <span class="w-4 h-4 bg-white rounded-full transform transition"></span>
      </button>
      <!-- <button
        type="button"
        (click)="product.active = !product.active"
        class="w-11 h-6 flex items-center rounded-full transition"
        [ngClass]="product.active ? 'bg-indigo-500' : 'bg-gray-300'"
      >
        <span
          class="w-4 h-4 bg-white rounded-full transform transition"
          [ngClass]="product.active ? 'translate-x-6' : 'translate-x-1'"
        ></span>
      </button> -->
    </div>

    <!-- Buttons -->
    <div class="flex gap-3 pt-2">
      <button
        type="submit"
        [disabled]="productForm.invalid"
        class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-xl text-sm font-semibold"
      >
        Create Product
      </button>

      <button
        type="button"
        class="px-5 py-2.5 border border-gray-200 rounded-xl text-sm text-gray-600 hover:bg-gray-100"
      >
        Reset
      </button>
    </div>
  </form>
</div>
